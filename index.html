<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style"
content="black-translucent">

<meta name="apple-mobile-web-app-title"
content="SP5 Electrical">

<meta name="theme-color" content="#0F1923">

<title>SP5 Electrical Management</title>

<script>

const APP_CONFIG = {

APP_URL:
'https://script.google.com/macros/s/AKfycbzE6zjlrA2iTSYsG4upYnk7Gv0PQduWv74r4cRBU-EGPEUnQBrclQl8Pf--FX44xdeeEg/exec',

APP_NAME:
'SP5 Electrical Management',

APP_SHORT:
'SP5 Elec',

DEPT:
'SP-5 Screening Plant · Electrical Department',

};

</script>

<style>

/* Reset */

*,*::before,*::after{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
height:100%;
width:100%;
overflow:hidden;
}

/* Default DARK */

body{
font-family:'Segoe UI',system-ui,-apple-system,sans-serif;

background:#0F1923;
color:#E2E8F0;

transition:background .3s,color .3s;
}

/* LIGHT MODE */

body.light{

background:#F1F5F9;
color:#0F172A;

}

/* Button */

#theme-toggle{

position:fixed;

top:12px;
right:12px;

z-index:999;

padding:8px 12px;

border:none;

border-radius:10px;

cursor:pointer;

background:#1E293B;

color:#fff;

font-size:14px;

}

/* Light button color */

body.light #theme-toggle{

background:#E2E8F0;
color:#000;

}

/* iframe */

#app-frame{

position:fixed;

top:0;
left:0;
right:0;
bottom:0;

width:100%;
height:100%;

border:none;

background:inherit;

}

/* Splash */

#splash{

position:fixed;

inset:0;

background:inherit;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:16px;

z-index:100;

transition:opacity .4s ease;

}

#splash.hide{

opacity:0;

pointer-events:none;

}

.splash-bolt{

font-size:64px;

animation:pulse 1.5s ease-in-out infinite;

}

@keyframes pulse{

0%,100%{
opacity:1;
transform:scale(1);
}

50%{
opacity:.7;
transform:scale(.95);
}

}

.splash-title{

font-size:22px;

font-weight:800;

color:#fff;

}

.splash-dept{

font-size:12px;

color:#64748B;

text-align:center;

}

.splash-bar{

width:180px;

height:3px;

background:rgba(255,255,255,.08);

border-radius:2px;

overflow:hidden;

}

.splash-progress{

height:100%;

width:0%;

background:linear-gradient(
90deg,
#2563EB,
#3B82F6
);

}

.splash-msg{

font-size:12px;

color:#64748B;

}

</style>

</head>

<body>

<!-- Toggle Button -->

<button id="theme-toggle">
Light Mode ☀️
</button>

<!-- Splash -->

<div id="splash">

<div class="splash-bolt">⚡</div>

<div>

<div class="splash-title"
id="splashTitle">

SP5 Electrical

</div>

<div class="splash-dept"
id="splashDept">

Loading...

</div>

</div>

<div class="splash-bar">

<div class="splash-progress"
id="splashBar">

</div>

</div>

<div class="splash-msg"
id="splashMsg">

Connecting to server...

</div>

</div>

<!-- iframe -->

<iframe
id="app-frame"

sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-top-navigation"

allow="camera; microphone"

></iframe>

<script>

/* Splash */

(function(){

document.getElementById(
'splashTitle'
).textContent=
APP_CONFIG.APP_NAME;

document.getElementById(
'splashDept'
).textContent=
APP_CONFIG.DEPT;

const bar=
document.getElementById(
'splashBar'
);

const msg=
document.getElementById(
'splashMsg'
);

const splash=
document.getElementById(
'splash'
);

const frame=
document.getElementById(
'app-frame'
);

let pct=0;

const msgs=[

[0,'Connecting to server...'],

[30,'Loading data...'],

[60,'Preparing interface...'],

[85,'Almost ready...']

];

const timer=setInterval(()=>{

pct=Math.min(
pct+(pct<70?2:0.5),
95
);

bar.style.width=
pct+'%';

const m=msgs
.slice()
.reverse()
.find(([p])=>pct>=p);

if(m)
msg.textContent=m[1];

},80);

frame.src=
APP_CONFIG.APP_URL;

frame.addEventListener(
'load',

()=>{

clearInterval(timer);

bar.style.width='100%';

msg.textContent='Ready!';

setTimeout(()=>{

splash.classList.add('hide');

},300);

setTimeout(()=>{

splash.style.display='none';

},750);

}

);

})();

/* Theme Toggle */

const btn=
document.getElementById(
"theme-toggle"
);

btn.addEventListener(
"click",

()=>{

document.body.classList
.toggle("light");

/* Change button text */

if(
document.body.classList
.contains("light")
){

btn.textContent=
"Dark Mode 🌙";

}
else{

btn.textContent=
"Light Mode ☀️";

}

}

);

</script>

</body>
</html>
