<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>SP5 Electrical</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- LOGIN SCREEN -->

<div id="loginScreen"
class="login-screen">

<div class="login-card">

<div class="login-logo">

<div class="logo-icon">
⚡
</div>

<div class="login-title">
SP5 Electrical
</div>

<div class="login-sub">
Management System
</div>

</div>

<div class="form-group">

<label>Username</label>

<input
type="text"
id="loginUser"
placeholder="Enter username">

</div>

<div class="form-group">

<label>Password</label>

<input
type="password"
id="loginPass"
placeholder="Enter password">

</div>

<div id="loginError"
class="login-error"
style="display:none">

</div>

<button
class="btn btn-primary btn-full"
onclick="doLogin()">

<span id="loginBtnText">
Login
</span>

</button>

</div>

</div>

<!-- MAIN APP -->

<div id="app"
style="display:none">

<!-- Topbar -->

<div class="topbar">

<button
class="menu-btn"
onclick="toggleSidebar()">

☰

</button>

<div
class="topbar-title"
id="pageTitle">

Dashboard

</div>

<div class="topbar-right">

<span
class="user-chip"
id="userChip">

</span>

<button
class="icon-btn"
onclick="doLogout()">

⏻

</button>

</div>

</div>

<!-- Sidebar -->

<div class="sidebar"
id="sidebar">

<div class="sidebar-header">

<div class="sidebar-logo">
⚡ SP5 Elec.
</div>

<button
class="sidebar-close"
onclick="toggleSidebar()">

✕

</button>

</div>

<nav class="sidebar-nav">

<a class="nav-item active"
onclick="navigate('dashboard')"
data-page="dashboard">

Dashboard

</a>

<a class="nav-item"
onclick="navigate('motors')"
data-page="motors">

Motor List

</a>

<a class="nav-item"
onclick="navigate('maintenance')"
data-page="maintenance">

Maintenance

</a>

<a class="nav-item"
onclick="navigate('greasing')"
data-page="greasing">

Greasing

</a>

<a class="nav-item"
onclick="navigate('repair')"
data-page="repair">

Repair

</a>

<a class="nav-item"
onclick="navigate('breakdown')"
data-page="breakdown">

Breakdown

</a>

<a class="nav-item"
onclick="navigate('directory')"
data-page="directory">

Directory

</a>

</nav>

</div>

<div class="sidebar-overlay"
id="sidebarOverlay"
onclick="toggleSidebar()">

</div>

<!-- PAGE CONTENT -->

<div class="page-content"
id="pageContent">

Loading...

</div>

</div>

<!-- MODAL -->

<div class="modal-overlay"
id="modalOverlay"
onclick="closeModal()">

</div>

<div class="modal"
id="modal">

<div class="modal-header">

<div class="modal-title"
id="modalTitle">

Form

</div>

<button
class="modal-close"
onclick="closeModal()">

✕

</button>

</div>

<div class="modal-body"
id="modalBody">

</div>

</div>

<div class="toast"
id="toast">

</div>

<script src="script.js"></script>

</body>

</html>
